<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MATCH UP AUTO TOOL</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" href="/icon.png">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MATCH UP">

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px 10px 60px;
  background:white;
  color:#111;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("icon.png") center center no-repeat;
  background-size:contain;
  opacity:0.10;
  z-index:-1;
}

h2{ font-size:26px; }

.board{
  display:grid;
  gap:6px;
  width:100%;
  max-width:380px;
  margin:20px auto;
}

.cell,
.hint{
  width:100%;
  height:60px;
  font-size:20px;
  font-weight:bold;
  border-radius:12px;
  box-sizing:border-box;
}

@media (min-width:600px){
  .cell,.hint{ height:70px; }
}

.cell{
  border:2px solid #222;
  background:white;

  display:flex;
  align-items:center;
  justify-content:center;
}

.hint{
  border:2px solid #ff4444;
  text-align:center;
}

button{
  margin-top:25px;
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:#111;
  color:white;
  font-weight:bold;
}

#message{
  margin-top:15px;
  font-weight:bold;
  min-height:24px;
  color:red;
}

.social{
  margin-top:60px;
  padding:30px 15px;
  background:rgba(0,0,0,0.05);
  border-radius:15px;
}

.link-title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:15px;
}

.social a{
  display:inline-block;
  padding:12px 24px;
  margin:8px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.yt{ background:#ff0000; }
.tt{ background:linear-gradient(45deg,#000,#ff0050,#00f2ea); }
</style>
</head>

<body>

<h2>MATCH UP AUTO TOOL</h2>

<select id="size" onchange="init()">
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<div id="game"></div>

<button onclick="solve()">決定</button>
<div id="message"></div>

<div class="social">
  <div class="link-title">がぁチャンネルのLink</div>

  <a class="yt"
     href="https://www.youtube.com/@%E3%81%8C%E3%81%81%E3%81%AE%E3%82%B2%E3%83%BC%E3%83%A0%E3%83%81%E3%83%A3%E3%83%B3%E3%83%8D%E3%83%AB"
     target="_blank">▶ YouTube</a>

  <a class="tt"
     href="https://www.tiktok.com/@eee_ggg_tt"
     target="_blank">♫ TikTok</a>
</div>

<script>
let n;

function init(){
  n=parseInt(document.getElementById("size").value);
  const game=document.getElementById("game");
  game.innerHTML="";
  game.className="board";
  game.style.gridTemplateColumns=`repeat(${n+2},1fr)`;
  document.getElementById("message").textContent="";

  for(let r=0;r<n+2;r++){
    for(let c=0;c<n+2;c++){
      if(r===0&&c>0&&c<=n) game.appendChild(createHint("top",c-1));
      else if(r===n+1&&c>0&&c<=n) game.appendChild(createHint("bottom",c-1));
      else if(c===0&&r>0&&r<=n) game.appendChild(createHint("left",r-1));
      else if(c===n+1&&r>0&&r<=n) game.appendChild(createHint("right",r-1));
      else if(r>0&&r<=n&&c>0&&c<=n){
        let div=document.createElement("div");
        div.className="cell";
        game.appendChild(div);
      } else game.appendChild(document.createElement("div"));
    }
  }
}

function createHint(type,i){
  let input=document.createElement("input");
  input.type="tel";
  input.inputMode="numeric";
  input.maxLength="1";
  input.className="hint";
  input.id=`${type}-${i}`;

  input.addEventListener("input",function(){
    this.value=this.value.replace(/[^0-9]/g,"");
    let num=parseInt(this.value);
    if(!num||num<1||num>n){this.value="";return;}

    moveNext(type,i);
    checkAutoSolve();
  });

  return input;
}

function moveNext(type,i){
  if(type==="top"){
    if(i<n-1) return document.getElementById(`top-${i+1}`).focus();
    return document.getElementById("right-0").focus();
  }
  if(type==="right"){
    if(i<n-1) return document.getElementById(`right-${i+1}`).focus();
    return document.getElementById(`bottom-${n-1}`).focus();
  }
  if(type==="bottom"){
    if(i>0) return document.getElementById(`bottom-${i-1}`).focus();
    return document.getElementById(`left-${n-1}`).focus();
  }
  if(type==="left"){
    if(i>0) return document.getElementById(`left-${i-1}`).focus();
  }
}

function checkAutoSolve(){
  let allFilled=true;
  for(let i=0;i<n;i++){
    if(!document.getElementById(`top-${i}`).value) allFilled=false;
    if(!document.getElementById(`bottom-${i}`).value) allFilled=false;
    if(!document.getElementById(`left-${i}`).value) allFilled=false;
    if(!document.getElementById(`right-${i}`).value) allFilled=false;
  }
  if(allFilled) solve();
}

function visible(arr){
  let max=0,count=0;
  for(let x of arr){
    if(x>max){ max=x; count++; }
  }
  return count;
}

function permutations(arr){
  if(arr.length===0) return [[]];
  let result=[];
  for(let i=0;i<arr.length;i++){
    let rest=[...arr.slice(0,i),...arr.slice(i+1)];
    for(let p of permutations(rest)){
      result.push([arr[i],...p]);
    }
  }
  return result;
}

function solve(){
　document.activeElement.blur();
  document.getElementById("message").textContent="";

  let rows=[...Array(n)].map((_,i)=>i+1);
  let perms=permutations(rows);

  let hints={top:[],bottom:[],left:[],right:[]};
  for(let i=0;i<n;i++){
    hints.top[i]=+document.getElementById(`top-${i}`).value||0;
    hints.bottom[i]=+document.getElementById(`bottom-${i}`).value||0;
    hints.left[i]=+document.getElementById(`left-${i}`).value||0;
    hints.right[i]=+document.getElementById(`right-${i}`).value||0;
  }

  let solution=null;

  function backtrack(grid){
    if(grid.length===n){
      for(let c=0;c<n;c++){
        let col=grid.map(r=>r[c]);
        if(hints.top[c] && visible(col)!=hints.top[c]) return;
        if(hints.bottom[c] && visible([...col].reverse())!=hints.bottom[c]) return;
      }
      solution=grid.map(r=>[...r]);
      return;
    }

    for(let perm of perms){
      let r=grid.length;

      if(hints.left[r] && visible(perm)!=hints.left[r]) continue;
      if(hints.right[r] && visible([...perm].reverse())!=hints.right[r]) continue;

      let valid=true;
      for(let c=0;c<n;c++){
        for(let rr=0;rr<grid.length;rr++){
          if(grid[rr][c]===perm[c]) valid=false;
        }
      }
      if(!valid) continue;

      grid.push(perm);
      backtrack(grid);
      grid.pop();
      if(solution) return;
    }
  }

  backtrack([]);

  if(solution){
    for(let r=0;r<n;r++){
      for(let c=0;c<n;c++){
        document.querySelectorAll(".cell")[r*n+c].textContent=solution[r][c];
      }
    }
  } else {
    document.getElementById("message").textContent =
      "どこか入力ミスがあります。もう一度確認してください。";
  }
}

init();
</script>

</body>
</html>
